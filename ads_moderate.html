<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои записи</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>

        body {
            font-family: system-ui;
            background: #f2f5f9;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: auto;
        }

        .close-btn {
            max-width: 400px;
            width: 100%;
            top: 10px;
            right: 10px;
            background: #c40505;
            color: white;
            display: inline-flex;
            flex-wrap: nowrap;
            align-content: center;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .primary {
            background: #3b82f6;
            color: white;
            display: inline-flex;
            flex-wrap: nowrap;
            align-content: center;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            width: 150px;
        }

        .primary:hover {
            background: #2563eb;
        }

        .cancel {
            background: #999;
            color: white;
            font-size: 16px;
        }

        .icon-btn {
            padding: 4px;
        }

        form {
            margin-top: 20px;
            padding: 18px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        form div {
            margin-bottom: 12px;
        }

        .input-wrapper{
            display:grid;
            grid-template-columns: 150px 1fr;
            align-items:center;
            gap:10px;
        }

        .input-wrapper label {
            font-size: 16px;
            color: #555;
        }

        input, select {
            width:100%;
            padding:7px;
            border-radius:6px;
            border:1px solid #ccc;
            font-size:14px;
            box-sizing:border-box;
        }

        input[type="checkbox"]{
            width:20px;
            height:20px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            transition: .25s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: .25s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background: #3b82f6;
        }

        .switch input:checked + .slider:before {
            transform: translateX(20px);
        }

        .hidden {
            display: none;
        }

        .card{
            background:white;
            border-radius:12px;
            margin-top:12px;
            border:1px solid #e6e6e6;
            overflow:hidden;
        }

        /* основной блок */

        .card-info{
            padding:14px 16px;
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .divider{
            height:1px;
            background:#ececec;
        }

        /* actions */

        .card-actions{
            display:flex;
            justify-content:flex-end;
            gap:6px;
            padding:8px 10px;
        }

        .type{
            font-size:18px;
            font-weight:600;
            background:#eef2ff;
            padding:10px;
            border-radius:6px;
            width:100%;
            box-sizing:border-box;
        }

        .datetime{
            display:flex;
            gap:14px;
            font-size:14px;
            color:#666;
        }

        .datetime span{
            display:flex;
            align-items:center;
            gap:4px;
        }

        .stats{
            display:flex;
            gap:16px;
            font-size:13px;
            color:#777;
        }

        .stats span{
            display:flex;
            align-items:center;
            gap:4px;
        }

        .card-buttons{
            display:flex;
            gap:4px;
        }

        .edit{
            background:#f3f4f6;
        }

        .edit:hover{
            background:#e5e7eb;
        }

        /* delete */

        .delete{
            background:#fee2e2;
        }

        .delete:hover{
            background:#fecaca;
        }

        .delete .material-icons{
            color:#ef4444;
        }

        .material-icons{
            font-size:20px;
        }

        /* mobile */

        @media (max-width: 600px) {

            .card {
                flex-direction: column;
                align-items: flex-start;
            }

            .card-buttons {
                width: 100%;
                justify-content: flex-end;
            }

        }

    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div class="container">

    <button type="button"
            id="closeBtn"
            class="close-btn">Закрити та вийти
    </button>

    <h1>Розсилка реклами</h1>

    <button class="primary" id="addBtn">
        Додати
    </button>

    <div id="formContainer" class="hidden">

        <form id="dataForm">

            <div class="input-wrapper">
                <label for="type">Група</label>
                <select id="type">
                    <option value="🇩🇪 Німеччина">🇩🇪 Німеччина</option>
                    <option value="🇦🇹🇭🇺 Австрія та Угорщина">🇦🇹🇭🇺 Австрія та Угорщина</option>
                    <option value="🇦🇱🇭🇷🇲🇪 Албанія, Хорватія та Чорногорія">🇦🇱🇭🇷🇲🇪 Албанія, Хорватія та Чорногорія</option>
                    <option value="🇧🇬🇷🇴 Болгарія та Румунія">🇧🇬🇷🇴 Болгарія та Румунія</option>
                    <option value="🇬🇧 Великобританія">🇬🇧 Великобританія</option>
                    <option value="🇬🇷🇨🇾 Греція та Кіпр">🇬🇷🇨🇾 Греція та Кіпр</option>
                    <option value="🇬🇪 Грузія">🇬🇪 Грузія</option>
                    <option value="🇪🇬 Єгипет">🇪🇬 Єгипет</option>
                    <option value="🇮🇱 Ізраіль">🇮🇱 Ізраіль</option>
                    <option value="🇮🇪 Ірландія">🇮🇪 Ірландія</option>
                    <option value="🇪🇦🇵🇹 Іспанія та Португалія">🇪🇦🇵🇹 Іспанія та Португалія</option>
                    <option value="🇮🇹 Італія">🇮🇹 Італія</option>
                    <option value="🇨🇦 Канада">🇨🇦 Канада</option>
                    <option value="🇱🇻🇱🇹🇪🇪 Латвія, Литва, Естонія">🇱🇻🇱🇹🇪🇪 Латвія, Литва, Естонія</option>
                    <option value="🇲🇹 Мальта">🇲🇹 Мальта</option>
                    <option value="🇳🇱🇧🇪🇩🇰 Нідерланди, Бельгія, Данія">🇳🇱🇧🇪🇩🇰 Нідерланди, Бельгія, Данія</option>
                    <option value="🇦🇪🇧🇭🇸🇦 ОАЕ, Катар, Саудівська Аравія">🇦🇪🇧🇭🇸🇦 ОАЕ, Катар, Саудівська Аравія</option>
                    <option value="🇵🇱 Польща">🇵🇱 Польща</option>
                    <option value="🇱🇷 США">🇱🇷 США</option>
                    <option value="🇹🇭 Таїланд">🇹🇭 Таїланд</option>
                    <option value="🇹🇷 Туреччина">🇹🇷 Туреччина</option>
                    <option value="🇫🇷 Франція">🇫🇷 Франція</option>
                    <option value="🇨🇿🇸🇰 Чехія та Словакія">🇨🇿🇸🇰 Чехія та Словакія</option>
                    <option value="🇨🇭 Швейцарія">🇨🇭 Швейцарія</option>
                    <option value="🇸🇪🇫🇮🇳🇴 Швеція, Фінляндія, Норвегія">🇸🇪🇫🇮🇳🇴 Швеція, Фінляндія, Норвегія</option>
                    <option value="LOCATIONS AND EVENTS">LOCATIONS AND EVENTS</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label for="date">Початкова дата</label>
                <input type="date" id="date" required>
            </div>

            <div class="input-wrapper">
                <label for="partDate">Частина дня</label>
                <select id="partDate" required>
                    <option value="Ранок">Ранок</option>
                    <option value="День">День</option>
                    <option value="Вечір">Вечір</option>
                    <option value="Ранок/День/Вечір">Ранок/День/Вечір</option>
                </select>
            </div>

            <div class="input-wrapper">
                <label for="postNumber">Кількість постів</label>
                <input type="number" id="postNumber" min="1" required>
            </div>

            <div class="input-wrapper">
                <label for="repeatAfter">Повтор через (днів)</label>
                <input type="number" id="repeatAfter" min="1" required>
            </div>

            <div class="input-wrapper">
                <label for="pinMessage">Закріпити</label>

                <label class="switch">
                    <input type="checkbox" id="pinMessage">
                    <span class="slider"></span>
                </label>

            </div>

            <button class="primary" type="submit">
                <span class="material-icons">save</span>
                Зберегти
            </button>

            <button type="button" class="cancel" id="cancelBtn">
                <span class="material-icons">close</span>
                Відміна
            </button>

        </form>

    </div>

    <div id="list"></div>

</div>

<script>

    const addBtn = document.getElementById("addBtn")
    const formContainer = document.getElementById("formContainer")
    const form = document.getElementById("dataForm")
    const list = document.getElementById("list")

    let items = JSON.parse(localStorage.getItem("items") || "[]")
    let editIndex = null

    let tg = window.Telegram.WebApp
    tg.expand();
    // установка сегодняшней даты и ограничения

    function render() {

        list.innerHTML = ""

        items.forEach((item, index) => {

            const card = document.createElement("div")
            card.className = "card"

            card.innerHTML = `

<div class="card-info">

<div class="type">
${item.type}
</div>

<div class="datetime">

<span>
<span class="material-icons">calendar_today</span>
${item.date}
</span>

<span>
<span class="material-icons">schedule</span>
${item.partDate}
</span>

</div>

<div class="stats">

<span>
<span class="material-icons">article</span>
${item.postNumber} постів
</span>

<span>
<span class="material-icons">repeat</span>
кожні ${item.repeatAfter} днів
</span>

</div>

${item.pinMessage ? `
<div class="stats">
<span>
<span class="material-icons">push_pin</span>
закріпити повідомлення
</span>
</div>
` : ""}

</div>

<div class="divider"></div>

<div class="card-actions">

<button class="action-btn edit">
<span class="material-icons">edit</span>
</button>

<button class="action-btn delete">
<span class="material-icons">delete</span>
</button>

</div>
`
            card.querySelector(".delete").onclick = () => {
                items.splice(index, 1)
                save()
                if (items.length === 0) {
                    tg.MainButton.hide();
                }
            }

            card.querySelector(".edit").onclick = () => {
                editIndex = index
                showForm(item)
            }
            list.appendChild(card)


        })
    }
    function setDefaultValues() {
        const dateInput = document.getElementById("date")
        const today = new Date()
        let month = today.getMonth() + 1 < 9 ? `0${today.getMonth() + 1}` : today.getMonth() + 1
        let day = today.getDate() < 9 ? `0${today.getDate()}` : today.getDate()
        const todayStr = `${today.getFullYear()}-${month}-${day}`
        dateInput.min = todayStr
        dateInput.value = todayStr

        const postNumber = document.getElementById("postNumber")
        postNumber.min = 1
        postNumber.value = 1

        const repeatAfter = document.getElementById("repeatAfter")
        repeatAfter.min = 1
        repeatAfter.value = 1
    }

    function save() {
        localStorage.setItem("items", JSON.stringify(items))
        render()
    }

    function showForm(data = null) {

        formContainer.classList.remove("hidden")
        addBtn.style.display = "none"


        if (data) {
            date.value = data.date
            partDate.value = data.partDate
            type.value = data.type
            postNumber.value = parseInt(data.postNumber)
            repeatAfter.value = parseInt(data.repeatAfter)
            pinMessage.checked = data.pinMessage || false

        } else {
            form.reset()
            setDefaultValues()
        }

    }

    function hideForm() {
        formContainer.classList.add("hidden")
        addBtn.style.display = "inline-block"
        editIndex = null
    }

    addBtn.onclick = () => showForm()

    cancelBtn.onclick = () => hideForm()

    form.onsubmit = (e) => {

        e.preventDefault()
        const item = {
            date: date.value,
            partDate: partDate.value,
            type: type.value,
            postNumber: parseInt(postNumber.value),
            repeatAfter: parseInt(repeatAfter.value),
            pinMessage: pinMessage.checked
        }

        if (editIndex !== null) {
            items[editIndex] = item
        } else {
            items.push(item)
        }

        save()
        hideForm()
        tg.MainButton.show();
    }

    render()

    tg.MainButton.setText('Відправити рекламу');
    Telegram.WebApp.onEvent('mainButtonClicked', function () {
        const data = JSON.stringify({
            items: items,
            type: 12
        });
        localStorage.clear()
        tg.sendData(data);
        tg.close();
    });

    let closeButton = document.getElementById("closeBtn");
    closeButton.addEventListener("click", event => {
        localStorage.clear()
        const data = JSON.stringify({
            type: 0,
            closeType: 'adsModerateConfig'
        });
        tg.sendData(data);
        tg.close();
    }, false);

</script>

</body>
</html>
