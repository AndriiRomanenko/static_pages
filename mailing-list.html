<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Відправка розсилки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<style>
    body {
        font-family: sans-serif;
        background-color: #fff;
        color: #222;
        font-size: 14px;
        margin: 0;
        padding: 0;
    }

    .center {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .padding-top {
        padding-top: 1rem;
    }

    .padding-bottom-1 {
        padding-bottom: 1rem;
    }

    .padding-bottom-3 {
        padding-bottom: 3rem;
    }

    .btn-full-width {
        display: flex;
        justify-content: center;
        margin: 5px;
        width: -webkit-fill-available;
    }

    .container {
    }

    .container h1 {
        font-size: 18px;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .container ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: inline-block;
    }

    .container li {
        display: inline-block;
        background: #e1e3e3;
        color: #232F34;
        padding: 3px 5px 3px 10px;
        border-radius: 15px;
        margin-top: 10px;
        margin-right: 5px;
    }

    .container a {
        color: #e1e3e3;
        text-decoration: none;
        margin-left: 7px;
        margin-right: 3px;
        margin-bottom: 3px;
        font-size: 10px;
        background: #666666;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        display: inline-flex;
        text-align: center;
        align-items: center;
        justify-content: center;
    }

    .container a:hover {
        color: red;
    }

    .checkbox-lg .form-check-input {
        top: .8rem;
        scale: 1.4;
        margin-right: 0.7rem;
    }

    .checkbox-lg .form-check-label {
        padding-top: 13px;
    }

    .checkbox-xl .form-check-input {
        top: 1.2rem;
        scale: 1.7;
        margin-right: 0.8rem;
        margin-left: -18px;
    }

    .checkbox-xl .form-check-label {
        padding-left: 10px;
    }

    .switch-container {
        display: flex;
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-items: center;
        flex-direction: row;
    }

</style>
<body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>

<button type="button"
        id="closeBtn"
        class="btn btn-danger btn-full-width">Закрити та вийти
</button>
<div class="mt-3 text-center fs-1">Розсилка</div>
<div class="container-md">
    <div class="padding-top"></div>
    <div class="card m-2">
        <div class="card-header">
            <div class="text-center fs-5">Текст розсилки</div>
        </div>
        <div class="card-body" id="messageText">
            <textarea class="form-control" aria-label="With textarea" rows="7"></textarea>
        </div>
    </div>
    <div class="padding-top"></div>
    <div class="card m-2">
        <div class="card-header">
            <div class="text-center fs-5">Отримувачі</div>
        </div>
        <div class="card-body">
            <select class="form-select" aria-label="Default select example" id="subTypeGroup">
                <option selected value="allExceptPaidSubs">📢 Усі підписники ОКРІМ ПЛАТНИХ</option>
                <option value="allSubs">📝 Усі підписники</option>
                <option value="testSubs">⏲️ Тестові підписники</option>
                <option value="paidSubs">💶 Платні підписники</option>
                <option value="expiredSubs">⛔️ Із закінченою підпискою</option>
                <option value="predefinedUsers">🔍 Окремі користувачі</option>
            </select>
        </div>
    </div>
    <div id="predefinedUsersGroup" class="container padding-top" hidden>
        <input type="text"
               id="predefinedInput"
               class="form-control"
               placeholder="Введіть Username або CHAT ID">
        <div id="predefinedInputValidation" class="invalid-feedback">
            CHAT ID або Username вже був введений
        </div>
        <ul id="usersList"></ul>
    </div>
    <div class="padding-top"></div>
    <div id="subjectsBlock">
        <div class="card m-2">
            <div class="card-header">
                <div class="text-center fs-5">Послуга</div>
            </div>
            <div class="card-body">
                <select class="form-select" aria-label="Default select example" id="subjectsGroup">
                    <option selected value="allSubjects">Усі послуги</option>
                    <option value="Пасажирські перевезення та посилки">Пасажирські перевезення та посилки</option>
                    <option value="Пасажирські перевезенняpass">Пасажирські перевезення</option>
                    <option value="Вантажні перевезення по країні">Вантажні перевезення по країні</option>
                    <option value="Індивідуальний трансфер">Індивідуальний трансфер</option>
                    <option value="Перевезення тварин">Перевезення тварин</option>
                    <option value="Фотограф">Фотограф</option>
                    <option value="Збирання меблів">Збирання меблів</option>
                    <option value="Збирання меблів і ремонт квартир">Збирання меблів і ремонт квартир</option>
                    <option value="Брови / Вії">Брови / Вії</option>
                    <option value="Манікюр / Педікюр">Манікюр / Педікюр</option>
                    <option value="Перукар">Перукар</option>
                    <option value="Майстер з волосся">Майстер з волосся</option>
                    <option value="Макіяж / Візаж">Макіяж / Візаж</option>
                    <option value="Косметологічні послуги">Косметологічні послуги</option>
                    <option value="Перманентний макіяж">Перманентний макіяж</option>
                    <option value="Масаж">Масаж</option>
                    <option value="Клінінгові послуги">Клінінгові послуги</option>
                    <option value="Курси мов">Курси мов</option>
                    <option value="Курси англійської мови онлайн">Курси англійської мови онлайн</option>
                    <option value="Курси болгарської мови онлайн">Курси болгарської мови онлайн</option>
                    <option value="Курси іспанської мови онлайн">Курси іспанської мови онлайн</option>
                    <option value="Курси італійської мови онлайн">Курси італійської мови онлайн</option>
                    <option value="Курси литовської мови онлайн">Курси литовської мови онлайн</option>
                    <option value="Курси нідерландської мови онлайн">Курси нідерландської мови онлайн</option>
                    <option value="Курси німецької мови онлайн">Курси німецької мови онлайн</option>
                    <option value="Курси португальскої мови онлайн">Курси португальскої мови онлайн</option>
                    <option value="Курси польської мови онлайн">Курси польської мови онлайн</option>
                    <option value="Курси румунської мови онлайн">Курси румунської мови онлайн</option>
                    <option value="Курси словацької мови онлайн">Курси словацької мови онлайн</option>
                    <option value="Курси чеської мови онлайн">Курси чеської мови онлайн</option>
                    <option value="Курси турецької мови онлайн">Курси турецької мови онлайн</option>
                    <option value="Курси української мови онлайн">Курси української мови онлайн</option>
                    <option value="Курси французької мови онлайн">Курси французької мови онлайн</option>
                    <option value="Тату / Пірсинг">Тату / Пірсинг</option>
                </select>
            </div>
        </div>
    </div>
    <div class="padding-top"></div>
    <div id="countryBlock">
        <div class="card m-2">
            <div class="card-header">
                <div class="text-center fs-5">Країна</div>
            </div>
            <div class="card-body">
                <select class="form-select" aria-label="Default select example" id="countryGroup">
                    <option selected value="allCountries">Усі країни</option>
                    <option value="Німеччина">Німеччина</option>
                    <option value="Австрія">Австрія</option>
                    <option value="Албанія">Албанія</option>
                    <option value="Бельгія">Бельгія</option>
                    <option value="Болгарія">Болгарія</option>
                    <option value="Боснія і Герцоговина">Боснія і Герцоговина</option>
                    <option value="Британія">Британія</option>
                    <option value="Греція">Греція</option>
                    <option value="Грузія">Грузія</option>
                    <option value="Данія">Данія</option>
                    <option value="Естонія">Естонія</option>
                    <option value="Єгипет">Єгипет</option>
                    <option value="Ірландія">Ірландія</option>
                    <option value="Іспанія">Іспанія</option>
                    <option value="Італія">Італія</option>
                    <option value="Кіпр">Кіпр</option>
                    <option value="Латвія">Латвія</option>
                    <option value="Литва">Литва</option>
                    <option value="Ліхтенштейн">Ліхтенштейн</option>
                    <option value="Люксембург">Люксембург</option>
                    <option value="Мальта">Мальта</option>
                    <option value="Молдова">Молдова</option>
                    <option value="Нідерланди">Нідерланди</option>
                    <option value="Норвегія">Норвегія</option>
                    <option value="ОАЕ">ОАЕ</option>
                    <option value="Північна Македонія">Північна Македонія</option>
                    <option value="Польща">Польща</option>
                    <option value="Португалія">Португалія</option>
                    <option value="Румунія">Румунія</option>
                    <option value="Сербія">Сербія</option>
                    <option value="Словаччина">Словаччина</option>
                    <option value="Словенія">Словенія</option>
                    <option value="Таїланд">Таїланд</option>
                    <option value="Туреччина">Туреччина</option>
                    <option value="Угорщина">Угорщина</option>
                    <option value="Фінляндія">Фінляндія</option>
                    <option value="Франція">Франція</option>
                    <option value="Хорватія">Хорватія</option>
                    <option value="Чехія">Чехія</option>
                    <option value="Чорногорія">Чорногорія</option>
                    <option value="Швейцарія">Швейцарія</option>
                    <option value="Швеція">Швеція</option>
                </select>
            </div>
        </div>
        <div class="form-check form-switch checkbox-xl switch-container">
            <input class="form-check-input" type="checkbox" role="switch" id="exceptSwitch"
                   style="form-switch-width: 5em">
            <label class="form-check-label fs-4" for="exceptSwitch">Додати виключення</label>
        </div>
        <div id="subExpGroup">
            <div class="container padding-top">
                <input type="text"
                       id="exceptInput"
                       class="form-control"
                       placeholder="Введіть Username або CHAT ID"
                       hidden>
                <div id="exceptInputValidation" class="invalid-feedback">
                    CHAT ID або Username вже був введений
                </div>
                <ul id="list"></ul>
            </div>
        </div>
    </div>
</div>
<div class="padding-bottom-3"></div>
</body>
<script type="application/javascript">
    let items = [];
    let predefinedUsers = [];
    let hasText = false
    let mailText = '';
    let subType = "allExceptPaidSubs";
    let subject = "allSubjects";
    let country = "allCountries";
    let messageText = document.getElementById('messageText');
    let subTypeGroup = document.getElementById('subTypeGroup');
    let subjectsGroup = document.getElementById('subjectsGroup');
    let countryGroup = document.getElementById('countryGroup');
    let exceptSwitch = document.getElementById('exceptSwitch');
    let exceptInput = document.getElementById('exceptInput');
    let predefinedUsersGroup = document.getElementById('predefinedUsersGroup');
    let predefinedInput = document.getElementById('predefinedInput');
    let subjectsBlock = document.getElementById('subjectsBlock');
    let countryBlock = document.getElementById('countryBlock');
    let list = document.getElementById('list');
    let usersList = document.getElementById('usersList');

    messageText.addEventListener('input', event => {
        hasText = event.target.value.trim() !== '';
        mailText = event.target.value.trim();
        isMainButtonActive()
    }, false);

    subTypeGroup.addEventListener("change", event => {
        subType = event.target.value;
        isMainButtonActive();
        if (subType === 'predefinedUsers') {
            predefinedUsersGroup.hidden = false;
            predefinedInput.focus();
            subjectsBlock.hidden = true;
            countryBlock.hidden = true;
        } else {
            predefinedUsersGroup.hidden = true;
            subjectsBlock.hidden = false;
            countryBlock.hidden = false;
        }
    }, false);

    subjectsGroup.addEventListener("change", event => {
        subject = event.target.value;
        isMainButtonActive();
    }, false);

    countryGroup.addEventListener("change", event => {
        country = event.target.value;
        isMainButtonActive();
    }, false);

    exceptInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let val = exceptInput.value.trim();
            if (val !== '') {
                if (items.indexOf(val) >= 0) {
                    exceptInput.classList.add("is-invalid");
                } else {
                    exceptInput.classList.remove("is-invalid");
                    items.push(val);
                    render();
                    exceptInput.value = '';
                    list.scrollIntoView({behavior: 'smooth', block: 'end'})
                }
            }
        }
    });

    predefinedInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            let val = predefinedInput.value.trim();
            if (val !== '') {
                if (predefinedUsers.indexOf(val) >= 0) {
                    predefinedInput.classList.add("is-invalid");
                } else {
                    predefinedInput.classList.remove("is-invalid");
                    predefinedUsers.push(val);
                    render2();
                    predefinedInput.value = '';
                    usersList.scrollIntoView({behavior: 'smooth', block: 'end'})
                }
            }
        }
    });

    exceptSwitch.addEventListener("input", event => {
        if (event.target.checked) {
            exceptInput.hidden = false;
            exceptInput.focus();
        } else {
            exceptInput.hidden = true;
            items = [];
            list.innerHTML = '';
        }
    }, false);

    function render() {
        list.innerHTML = '';
        items.map((item, index) => {
            list.innerHTML += `<li><span>${item}</span><a href="javascript: remove(${index})">✕</a></li>`;
        });
    }

    function render2() {
        usersList.innerHTML = '';
        predefinedUsers.map((item, index) => {
            usersList.innerHTML += `<li><span>${item}</span><a href="javascript: remove2(${index})">✕</a></li>`;
        });
    }

    function remove(i) {
        items = items.filter(item => items.indexOf(item) != i);
        render();
    }

    function remove2(i) {
        predefinedUsers = predefinedUsers.filter(item => predefinedUsers.indexOf(item) != i);
        render2();
    }

    let tg = window.Telegram.WebApp
    tg.expand();

    subTypeGroup.addEventListener("input", event => {
        subType = event.target.id;
        isMainButtonActive();
        exceptSwitch.focus();
    }, false);

    function isShow() {
        return hasText && subType !== 'none';
    }

    function isMainButtonActive() {
        if (isShow()) {
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.MainButton.setText('Відправити розсилку');
    Telegram.WebApp.onEvent('mainButtonClicked', function () {
        const data = JSON.stringify({
            subscriptionType: subType,
            subject: subject,
            country: country,
            text: mailText,
            exceptUsers: items,
            predefinedUsers: predefinedUsers,
            type: 9
        });
        tg.sendData(data);
        tg.close();
    });

    let closeButton = document.getElementById("closeBtn");
    closeButton.addEventListener("click", event => {
        const data = JSON.stringify({
            type: 0,
            closeType: 'mailingList'
        });
        tg.sendData(data);
        tg.close();
    }, false);

</script>
</html>
